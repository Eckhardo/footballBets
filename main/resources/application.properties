## server props
server.port=8080
server.servlet.context-path=/bulitipper/api
spring.application.name=bulitipper
## Performance
spring.main.lazy-initialization=true
## Turn off Spring Boot Banner
spring.main.banner-mode=off
## Data Source properties
spring.mvc.problemdetails.enabled=true
spring.datasource.url=jdbc:mysql://localhost:3306/bulitippertest?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
## Log Level
logging.level.org.hibernate=error
logging.level.sportbets=debug
logging.level.org.ehcache=trace

## Documentation (OpenAPI Swagger)
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

## Hibernate properties
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.connection.autocommit=false
spring.jpa.properties.hibernate.connection.pool_sizepool_size=${spring.datasource.hikari.maximum-pool-size}
## hibernate ehcache
# Cache aktivieren
hibernate.cache.use_second_level_cache=true
hibernate.cache.use_query_cache=true

# Die ConfigurableJCacheRegionFactory verwenden
hibernate.cache.region.factory_class=org.hibernate.cache.jcache.internal.ConfigurableJCacheRegionFactory

# Spezifischer JCache Provider für Ehcache
hibernate.javax.cache.provider=org.ehcache.jsr107.EhcacheCachingProvider

# Pfad zur ehcache.xml
hibernate.javax.cache.uri=classpath:ehcache.xml